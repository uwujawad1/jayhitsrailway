providers = ["node", "python"]

[phases.setup]
nixPkgs = ["nodejs_18", "python311", "openssl"]

[phases.install]
cmds = [
  "npm ci",
  "python -m pip install -r requirements.txt",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "python -m uvicorn railway_backend:app --host 0.0.0.0 --port ${PORT:-8000}"
